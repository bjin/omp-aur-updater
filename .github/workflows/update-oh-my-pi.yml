name: Update oh-my-pi AUR package

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - oh-my-pi-nix-master

permissions:
  contents: write

concurrency:
  group: update-aur-oh-my-pi
  cancel-in-progress: false

jobs:
  update:
    name: Build, test, and publish oh-my-pi
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show trigger context
        env:
          EVENT_NAME: ${{ github.event_name }}
          SOURCE_REPOSITORY: ${{ github.event.client_payload.repository || github.repository }}
          SOURCE_REF: ${{ github.event.client_payload.ref || github.ref }}
          SOURCE_SHA: ${{ github.event.client_payload.sha || github.sha }}
        run: |
          echo "event=$EVENT_NAME"
          echo "source_repository=$SOURCE_REPOSITORY"
          echo "source_ref=$SOURCE_REF"
          echo "source_sha=$SOURCE_SHA"

      - name: Install SSH key
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$AUR_SSH_PRIVATE_KEY" ]; then
            echo "AUR_SSH_PRIVATE_KEY secret is not configured." >&2
            exit 1
          fi

          install -d -m 700 ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t ed25519 aur.archlinux.org > ~/.ssh/aur_known_hosts
          aur_fingerprint=$(ssh-keygen -lf ~/.ssh/aur_known_hosts -E sha256 | awk '{print $2}')
          if [ "$aur_fingerprint" != 'SHA256:RFzBCUItH9LZS0cKB5UE6ceAYhBD5C8GeOBip8Z11+4' ]; then
            echo "Unexpected aur.archlinux.org SSH host key fingerprint: $aur_fingerprint" >&2
            exit 1
          fi
          cat ~/.ssh/aur_known_hosts >> ~/.ssh/known_hosts
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            HostName aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
          EOF

      - name: Clone AUR package
        run: git clone ssh://aur@aur.archlinux.org/oh-my-pi.git aur

      - name: Record starting commit
        id: base
        working-directory: aur
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Run AUR update script
        working-directory: aur
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD:/pkg" archlinux:base-devel bash -lc '
            set -euo pipefail
            pacman -Syu --noconfirm --needed bun git rustup gcc-libs glibc icu zlib

            host_uid=$(stat -c %u /pkg)
            host_gid=$(stat -c %g /pkg)

            if ! getent group "$host_gid" >/dev/null; then
              groupadd -g "$host_gid" builder
            fi

            if getent passwd "$host_uid" >/dev/null; then
              builder=$(getent passwd "$host_uid" | cut -d: -f1)
            else
              useradd -m -u "$host_uid" -g "$host_gid" builder
              builder=builder
            fi

            builder_home=$(getent passwd "$builder" | cut -d: -f6)
            install -d -o "$host_uid" -g "$host_gid" "$builder_home"

            su "$builder" -s /usr/bin/bash <<'"'"'EOSU'"'"'
            set -euo pipefail
            cd /pkg
            git config user.name "Bin Jin"
            git config user.email "bjin@protonmail.com"
            git config commit.gpgsign false
            ./update.sh
          EOSU
          '

      - name: Detect generated commit and package
        id: update
        working-directory: aur
        env:
          BASE_SHA: ${{ steps.base.outputs.sha }}
        run: |
          set -euo pipefail
          if [ "$(git rev-parse HEAD)" = "$BASE_SHA" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No AUR update generated."
            exit 0
          fi

          shopt -s nullglob
          packages=( *.pkg.tar.* )
          if [ "${#packages[@]}" -ne 1 ]; then
            echo "Expected one built package, found ${#packages[@]}." >&2
            printf '  %s\n' "${packages[@]}" >&2
            exit 1
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "package_filename=${packages[0]}" >> "$GITHUB_OUTPUT"


      - name: Push commit to AUR
        if: steps.update.outputs.changed == 'true'
        working-directory: aur
        run: git push origin master

      - name: Publish signed pacman repository
        if: steps.update.outputs.changed == 'true'
        env:
          ARCH_REPO_GPG_PRIVATE_KEY: ${{ secrets.ARCH_REPO_GPG_PRIVATE_KEY }}
          GH_TOKEN: ${{ github.token }}
          PACKAGE_FILENAME: ${{ steps.update.outputs.package_filename }}
        run: |
          set -euo pipefail
          docker run --rm \
            -e ARCH_REPO_GPG_PRIVATE_KEY \
            -e GH_TOKEN \
            -e GITHUB_REPOSITORY \
            -e PACKAGE_FILENAME \
            -v "$PWD:/work" \
            -w /work \
            archlinux:base-devel bash -lc '
              set -euo pipefail
              pacman -Syu --noconfirm --needed gnupg python
              python3 scripts/publish_arch_repo.py \
                --release oh-my-pi \
                --repo-name oh-my-pi \
                --key-fingerprint F35777CFE7F0794D92338EA52FABE6F52B586BAB \
                --keep-newest 5 \
                --minimum-age-days 7 \
                "aur/${PACKAGE_FILENAME}"
            '

