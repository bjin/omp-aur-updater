name: Update oh-my-pi AUR package and pacman repo

on:
  workflow_dispatch:
  schedule:
    - cron: "18,38,58 * * * *"

permissions:
  contents: write

concurrency:
  group: update-aur-oh-my-pi
  cancel-in-progress: false

jobs:
  update:
    name: Build, test, and publish oh-my-pi
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install SSH key
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$AUR_SSH_PRIVATE_KEY" ]; then
            echo "AUR_SSH_PRIVATE_KEY secret is not configured." >&2
            exit 1
          fi

          install -d -m 700 ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t ed25519 aur.archlinux.org > ~/.ssh/aur_known_hosts
          aur_fingerprint=$(ssh-keygen -lf ~/.ssh/aur_known_hosts -E sha256 | awk '{print $2}')
          if [ "$aur_fingerprint" != 'SHA256:RFzBCUItH9LZS0cKB5UE6ceAYhBD5C8GeOBip8Z11+4' ]; then
            echo "Unexpected aur.archlinux.org SSH host key fingerprint: $aur_fingerprint" >&2
            exit 1
          fi
          cat ~/.ssh/aur_known_hosts >> ~/.ssh/known_hosts
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            HostName aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
          EOF

      - name: Clone AUR package
        run: git clone ssh://aur@aur.archlinux.org/oh-my-pi.git aur

      - name: Check upstream version and update PKGBUILD
        id: update
        working-directory: aur
        run: |
          set -euo pipefail

          latest_ref=$(
            git ls-remote --refs --tags --sort=-v:refname \
              https://github.com/can1357/oh-my-pi.git 'v*.*.*' |
              awk 'NR == 1 { print $2 }'
          )
          if [ -z "$latest_ref" ]; then
            echo "Unable to find the latest upstream version tag." >&2
            exit 1
          fi

          latest_version="${latest_ref##*/v}"
          if [[ "$latest_version" != *.*.* ]]; then
            echo "Invalid upstream version: $latest_version" >&2
            exit 1
          fi

          current_version=$(awk -F= '/^pkgver=/{ print $2; exit }' PKGBUILD)
          current_version="${current_version//[[:space:]]/}"
          if [ -z "$current_version" ]; then
            echo "Unable to read pkgver from PKGBUILD." >&2
            exit 1
          fi
          if [[ "$current_version" != *.*.* ]]; then
            echo "Invalid pkgver in PKGBUILD: $current_version" >&2
            exit 1
          fi

          echo "version=$latest_version" >> "$GITHUB_OUTPUT"
          current_is_current_or_newer=$(
            python3 - "$current_version" "$latest_version" <<'PY'
          import sys

          current = tuple(int(part) for part in sys.argv[1].split("."))
          latest = tuple(int(part) for part in sys.argv[2].split("."))
          print("true" if current >= latest else "false")
          PY
          )
          if [ "$current_is_current_or_newer" = true ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No update needed: current package $current_version, latest upstream $latest_version"
            exit 0
          fi

          pkgbuild_tmp=$(mktemp)
          trap 'rm -f "$pkgbuild_tmp"' EXIT
          if ! awk -v latest_version="$latest_version" '
            BEGIN {
              updated_pkgver = 0
              updated_pkgrel = 0
            }
            /^pkgver=/ && !updated_pkgver {
              print "pkgver=" latest_version
              updated_pkgver = 1
              next
            }
            /^pkgrel=/ && !updated_pkgrel {
              print "pkgrel=1"
              updated_pkgrel = 1
              next
            }
            {
              print
            }
            END {
              exit((updated_pkgver && updated_pkgrel) ? 0 : 1)
            }
          ' PKGBUILD > "$pkgbuild_tmp"; then
            echo "Unable to update pkgver and pkgrel in PKGBUILD." >&2
            exit 1
          fi
          mv "$pkgbuild_tmp" PKGBUILD

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "Updated: $current_version -> $latest_version"

      - name: Build and smoke test package
        if: steps.update.outputs.changed == 'true'
        working-directory: aur
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD:/pkg" archlinux:base-devel bash -lc '
            set -euo pipefail
            pacman -Syu --noconfirm --needed bun git rustup gcc-libs glibc icu zlib

            host_uid=$(stat -c %u /pkg)
            host_gid=$(stat -c %g /pkg)

            if ! getent group "$host_gid" >/dev/null; then
              groupadd -g "$host_gid" builder
            fi

            if getent passwd "$host_uid" >/dev/null; then
              builder=$(getent passwd "$host_uid" | cut -d: -f1)
            else
              useradd -m -u "$host_uid" -g "$host_gid" builder
              builder=builder
            fi

            builder_home=$(getent passwd "$builder" | cut -d: -f6)
            install -d -o "$host_uid" -g "$host_gid" "$builder_home"

            su "$builder" -s /usr/bin/bash <<'"'"'EOSU'"'"'
            set -euo pipefail
            cd /pkg
            makepkg
            makepkg --printsrcinfo >.SRCINFO

            runtime_dir=$(mktemp -d)
            trap '"'"'rm -rf "$runtime_dir"'"'"' EXIT
            smoke_output=$(
              env HOME="${runtime_dir}/home" XDG_DATA_HOME="${runtime_dir}/xdg" \
                pkg/oh-my-pi/usr/bin/omp --smoke-test
            )
            if [ "$smoke_output" != "smoke-test: ok" ]; then
              echo "Unexpected omp --smoke-test output: $smoke_output" >&2
              exit 1
            fi
          EOSU
          '

      - name: Record built package
        if: steps.update.outputs.changed == 'true'
        id: package
        working-directory: aur
        run: |
          set -euo pipefail
          shopt -s nullglob
          packages=( *.pkg.tar.* )
          if [ "${#packages[@]}" -ne 1 ]; then
            echo "Expected one built package, found ${#packages[@]}." >&2
            printf '  %s\n' "${packages[@]}" >&2
            exit 1
          fi
          echo "filename=${packages[0]}" >> "$GITHUB_OUTPUT"

      - name: Commit and push to AUR
        if: steps.update.outputs.changed == 'true'
        working-directory: aur
        env:
          VERSION: ${{ steps.update.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "Bin Jin"
          git config user.email "bjin@protonmail.com"
          git config commit.gpgsign false
          git add PKGBUILD .SRCINFO
          git diff --cached --check
          if git diff --cached --quiet; then
            echo "No package metadata changes to commit." >&2
            exit 1
          fi
          git --no-pager diff --cached
          git commit -m "upstream release: ${VERSION}"
          git push origin master

      - name: Publish signed pacman repository
        if: steps.update.outputs.changed == 'true'
        env:
          ARCH_REPO_GPG_PRIVATE_KEY: ${{ secrets.ARCH_REPO_GPG_PRIVATE_KEY }}
          GH_TOKEN: ${{ github.token }}
          PACKAGE_FILENAME: ${{ steps.package.outputs.filename }}
        run: |
          set -euo pipefail
          docker run --rm \
            -e ARCH_REPO_GPG_PRIVATE_KEY \
            -e GH_TOKEN \
            -e GITHUB_REPOSITORY \
            -e PACKAGE_FILENAME \
            -v "$PWD:/work" \
            -w /work \
            archlinux:base-devel bash -lc '
              set -euo pipefail
              pacman -Syu --noconfirm --needed gnupg python
              python3 scripts/publish_arch_repo.py \
                --release oh-my-pi \
                --repo-name oh-my-pi \
                --key-fingerprint F35777CFE7F0794D92338EA52FABE6F52B586BAB \
                --keep-newest 5 \
                --minimum-age-days 7 \
                "aur/${PACKAGE_FILENAME}"
            '

